name: Publish

on:
  release:
    types: [published]
  workflow_dispatch: {} # manual retry (e.g. run against an existing tag) without recreating the release

permissions:
  contents: read
  id-token: write # for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify package.json version matches the release tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag ($GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Type check
        run: npm run typecheck

      - name: Lint & format check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
